<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPP 年度数据 Dashboard</title>
    <link rel="stylesheet" href="./assets/style.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script defer src="./assets/assistant-state.js"></script>
    <script defer src="./assets/assistant-tools.js"></script>
    <script defer src="./assets/assistant-ui.js"></script>
    <script defer src="./assets/assistant-runtime.js"></script>
    <script defer src="./assets/dashboard.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <div class="brand">VPP 年度数据 Dashboard</div>
        <div class="subtitle">
          数据源：<code>data/虚拟电厂_24h15min_数据.csv</code>
          <span class="subtitle__sep">·</span>
          最后更新：<span id="last-updated">-</span>
        </div>
      </div>
      <div class="topbar__right">
        <a class="link" href="./README.md" target="_blank" rel="noreferrer">使用说明</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel panel--dashboard">
        <div class="section">
          <div class="section__title">筛选与概览</div>
          <div class="controls">
            <div class="control">
              <label for="start">起始 时间</label>
              <input id="start" type="text" placeholder="YYYY/MM/DD HH:MM（例如 2026/03/16 08:00）" />
            </div>
            <div class="control">
              <label for="end">结束 时间</label>
              <input id="end" type="text" placeholder="YYYY/MM/DD HH:MM（例如 2026/03/16 20:00）" />
            </div>
            <div class="control">
              <label for="metric">主图指标</label>
              <select id="metric"></select>
            </div>
            <div class="control control--buttons">
              <button id="apply" class="btn btn--primary">应用筛选</button>
              <button id="reset" class="btn">重置</button>
              <button id="download" class="btn">导出筛选结果 CSV</button>
            </div>
          </div>

          <div class="kpis">
            <div class="kpi">
              <div class="kpi__label">行数（筛选后）</div>
              <div class="kpi__value" id="kpi-rows">-</div>
            </div>
            <div class="kpi">
              <div class="kpi__label">负荷（kW，均值/峰值）</div>
              <div class="kpi__value" id="kpi-load">-</div>
            </div>
            <div class="kpi">
              <div class="kpi__label">光伏（kW，均值/峰值）</div>
              <div class="kpi__value" id="kpi-pv">-</div>
            </div>
            <div class="kpi">
              <div class="kpi__label">实时电价（元/kWh，均值/峰值）</div>
              <div class="kpi__value" id="kpi-price">-</div>
            </div>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <div class="card__title">主图</div>
            <div class="chart" id="chart-main"></div>
          </div>

          <div class="card">
            <div class="card__title">负荷 / 光伏 / 电价</div>
            <div class="chart" id="chart-mix"></div>
          </div>

          <div class="card card--full">
            <div class="card__header">
              <div class="card__title">预测结果（未来 12h）</div>
              <div class="card__tools">
                <label for="forecast-type">展示</label>
                <select id="forecast-type"></select>
                <button id="forecast-run" class="btn btn--primary">运行预测</button>
              </div>
            </div>
            <div class="chart" id="chart-forecast"></div>
            <div class="forecast__hint" id="forecast-hint">-</div>
          </div>

          <div class="card card--full">
            <div class="card__header">
              <div class="card__title">决策结果（未来 12h）</div>
              <div class="card__tools">
                <button id="decision-run" class="btn btn--primary">生成决策</button>
              </div>
            </div>
            <div class="chart" id="chart-decision"></div>
            <div class="forecast__hint" id="decision-hint">-</div>
          </div>

          <div class="card card--full">
            <div class="card__title">数据预览（前 200 行）</div>
            <div class="table-wrap">
              <table class="table" id="table"></table>
            </div>
          </div>
        </div>
      </section>

      <aside class="panel panel--assistant">
        <div class="assistant__title">E-Agent</div>
        <div class="assistant__panel">
          <div class="assistant__toolbar">
            <div class="assistant__mode">
              <label for="assistant-mode">模式</label>
              <select id="assistant-mode">
                <option value="chat">Chat</option>
                <option value="agent" selected>Agent</option>
              </select>
            </div>
            <div class="assistant__mode">
              <label for="assistant-autonomy">自治级别</label>
              <select id="assistant-autonomy">
                <option value="suggest_only">只给建议</option>
                <option value="confirm_first">执行前确认</option>
                <option value="auto_safe" selected>自动执行安全动作</option>
              </select>
            </div>
            <button id="assistant-cancel-task" class="btn">中断执行</button>
          </div>
          <div class="assistant__approval" id="assistant-approval" hidden>
            <div class="assistant__approval-title">待确认动作</div>
            <div class="assistant__approval-text" id="assistant-approval-text"></div>
            <div class="assistant__approval-actions">
              <button id="assistant-approve" class="btn btn--primary">批准执行</button>
              <button id="assistant-reject" class="btn">拒绝</button>
            </div>
          </div>
          <div class="assistant__section">
            <div class="assistant__section-title">建议</div>
            <div class="assistant__suggestions" id="assistant-suggestions"></div>
          </div>
          <div class="assistant__section assistant__section--messages">
            <div class="assistant__section-title">对话</div>
            <div class="assistant__messages" id="assistant-messages"></div>
          </div>
          <div class="assistant__section">
            <div class="assistant__section-title">任务</div>
            <div class="assistant__tasks" id="assistant-tasks"></div>
          </div>
          <div class="assistant__controls">
            <textarea
              id="assistant-input"
              placeholder="输入目标或问题，回车发送；Shift+回车换行"
              rows="3"
            ></textarea>
            <div class="assistant__actions">
              <button id="assistant-send" class="btn btn--primary">发送</button>
              <button id="assistant-clear" class="btn">清空</button>
            </div>
            <div class="assistant__files">
              <div class="assistant__file-row">
                <label for="assistant-file">上传文件</label>
                <input id="assistant-file" type="file" multiple />
              </div>
              <div class="assistant__file-row assistant__file-row--path">
                <label for="assistant-path">读取 data/ 路径</label>
                <div class="assistant__file-path">
                  <input id="assistant-path" type="text" value="data/虚拟电厂_24h15min_数据.csv" />
                  <button id="assistant-load" class="btn">读取</button>
                </div>
              </div>
              <div class="assistant__file-row assistant__file-row--fixed">
                <label for="assistant-target">固定写入目标</label>
                <div class="assistant__file-target">
                  <select id="assistant-target"></select>
                  <button id="assistant-write-target" class="btn">写入所选文件</button>
                </div>
              </div>
              <div class="assistant__file-list" id="assistant-files"></div>
              <div class="assistant__file-hint" id="assistant-file-hint">仅允许读取 data/ 目录下的文件；写文件会按自治级别决定是否先确认。</div>
            </div>
            <div class="assistant__status" id="assistant-status">未连接</div>
          </div>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <div>
        提示：本页面需要通过静态服务器访问（不要直接双击打开），否则浏览器可能阻止读取 CSV。
      </div>
    </footer>
  </body>
</html>
